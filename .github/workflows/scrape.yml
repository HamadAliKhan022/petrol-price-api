name: Run Petrol Price Scraper

on:
  schedule:
    - cron: '0 */12 * * *' # Runs automatically every 12 hours
  workflow_dispatch: # Allows you to manually trigger it via GitHub UI anytime

permissions:
  contents: write # Grants the runner permission to push updates back to main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run scraper script
      run: python scraper.py

    - name: Commit and Push update to repository
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add petrol_prices.json
        git diff-index --quiet HEAD || (git commit -m "Automated price update: $(date)" && git push)
